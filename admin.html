<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Batch 32</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; padding: 20px; direction: rtl; }
        .admin-box { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #34495e; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        button { background: #2c3e50; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #d4af37; color: #2c3e50; }
        .status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>إضافة مقال طبي جديد 📝</h2>
        
        <label>عنوان المقال</label>
        <input type="text" id="title" placeholder="مثلاً: نصائح لصحة الفم">

        <label>التصنيف</label>
        <input type="text" id="category" placeholder="مثلاً: أخلاقيات / طب أسنان">

        <label>نبذة مختصرة</label>
        <textarea id="summary" placeholder="وصف قصير يظهر في قائمة المدونة" rows="2"></textarea>

        <label>المحتوى الكامل</label>
        <textarea id="content" placeholder="اكتب المقال بالتفصيل هنا..." rows="10"></textarea>

        <button onclick="publishArticle()">نشر المقال الآن 🚀</button>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // --- إعدادات الربط (انظر للصورة الثانية لديك) ---
        
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co'; // الرابط الخاص بك
        
        // اذهب للصورة الثانية، انسخ الكود الطويل تحت "Publishable key" وضعه هنا
        const SUPABASE_KEY = 'ضـع_كـود_الـ_Publishable_key_هـنـا'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function publishArticle() {
            const statusDiv = document.getElementById('status');
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const summary = document.getElementById('summary').value;
            const content = document.getElementById('content').value;

            if(!title || !content) {
                statusDiv.style.color = 'red';
                statusDiv.innerText = "⚠️ يرجى ملء العنوان والمحتوى!";
                return;
            }

            statusDiv.style.color = 'orange';
            statusDiv.innerText = "جاري النشر... ⏳";

            const { data, error } = await _supabase
                .from('articles')
                .insert([{ title, category, summary, content }]);

            if (error) {
                statusDiv.style.color = 'red';
                statusDiv.innerText = "❌ خطأ: " + error.message;
            } else {
                statusDiv.style.color = 'green';
                statusDiv.innerText = "✅ تم النشر بنجاح! المقال الآن أونلاين.";
                // مسح البيانات بعد النجاح
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            }
        }
    </script>
</body>
</html>
