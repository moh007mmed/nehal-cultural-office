<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | Nihal Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --gold: #d4af37; --bg: #f8f9fa; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: var(--primary); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: var(--gold); color: var(--primary); }
        .article-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; border: none; cursor: pointer; }
        #auth-screen { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="card" style="max-width: 400px; margin: auto;">
            <h2>مرحباً نهال 👋</h2>
            <p>يرجى إدخال كلمة المرور للمتابعة</p>
            <input type="password" id="pass-field" placeholder="كلمة المرور">
            <button class="btn" onclick="checkAuth()">دخول</button>
        </div>
    </div>

    <div id="admin-content" class="container" style="display: none;">
        <div class="header">
            <h1>لوحة إدارة محتوى Batch 32 🦷</h1>
            <p>أهلاً بكِ نهال، يمكنكِ إضافة أو حذف المقالات من هنا.</p>
        </div>

        <div class="card">
            <h3>إضافة مقال جديد</h3>
            <input type="text" id="title" placeholder="عنوان المقال">
            <input type="text" id="category" placeholder="التصنيف (مثلاً: أخلاقيات)">
            <textarea id="summary" placeholder="نبذة مختصرة تظهر في المدونة" rows="2"></textarea>
            <textarea id="content" placeholder="محتوى المقال الكامل..." rows="6"></textarea>
            <button class="btn" onclick="publish()">نشر المقال الآن 🚀</button>
        </div>

        <div class="card">
            <h3>المقالات المنشورة حالياً</h3>
            <div id="articles-list">جاري التحميل...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function checkAuth() {
            const pass = document.getElementById('pass-field').value;
            if(pass === "3232") { // كلمة المرور الافتراضية
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadAdminArticles();
            } else { alert("كلمة المرور خاطئة!"); }
        }

        async function publish() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const summary = document.getElementById('summary').value;
            const content = document.getElementById('content').value;

            if(!title || !content) return alert("يرجى ملء الحقول المطلوبة!");

            const { error } = await _supabase.from('articles').insert([{ title, category, summary, content }]);
            if (error) alert("حدث خطأ: " + error.message);
            else {
                alert("تم النشر بنجاح!");
                document.querySelectorAll('input, textarea').forEach(el => el.value = '');
                loadAdminArticles();
            }
        }

        async function loadAdminArticles() {
            const { data } = await _supabase.from('articles').select('*').order('id', { ascending: false });
            const list = document.getElementById('articles-list');
            list.innerHTML = data.map(art => `
                <div class="article-item">
                    <span><strong>${art.title}</strong> (${art.category})</span>
                    <button class="btn-delete" onclick="deleteArt(${art.id})">حذف 🗑️</button>
                </div>
            `).join('');
        }

        async function deleteArt(id) {
            if(!confirm("حذف هذا المقال؟")) return;
            await _supabase.from('articles').delete().eq('id', id);
            loadAdminArticles();
        }
    </script>
</body>
</html>
