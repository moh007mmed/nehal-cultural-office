<div class="admin-box" style="margin-top: 20px;">
    <h3>إدارة المقالات المنشورة</h3>
    <div id="articles-list">جاري تحميل المقالات...</div>
</div>

<script>
    // ... الكود السابق للإرسال ...

    // وظيفة لجلب المقالات وعرضها مع زر الحذف
    async function loadArticlesForAdmin() {
        const { data, error } = await _supabase.from('articles').select('*').order('id', { ascending: false });
        if (error) return;

        const listDiv = document.getElementById('articles-list');
        listDiv.innerHTML = data.map(art => `
            <div style="border-bottom: 1px solid #eee; padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>${art.title}</span>
                <button onclick="deleteArticle(${art.id})" style="background:red; width:auto; padding: 5px 10px; font-size: 0.8rem;">حذف 🗑️</button>
            </div>
        `).join('');
    }

    // وظيفة الحذف
    async function deleteArticle(id) {
        if (!confirm("هل أنت متأكد من حذف هذا المقال؟")) return;
        const { error } = await _supabase.from('articles').delete().eq('id', id);
        if (error) alert("خطأ في الحذف");
        else {
            alert("تم الحذف!");
            loadArticlesForAdmin(); // تحديث القائمة
        }
    }

    window.onload = loadArticlesForAdmin;
</script>
