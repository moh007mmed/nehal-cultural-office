<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية | Nihal Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #2c3e50; 
            --gold: #d4af37; 
            --bg: #f4f7f6; 
            --white: #ffffff;
            --danger: #e74c3c;
            --success: #27ae60;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--primary); }

        /* Auth Screen */
        #auth-screen { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: linear-gradient(135deg, var(--primary) 0%, #1a252f 100%);
        }
        .auth-card { 
            background: var(--white); padding: 40px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px; 
        }

        /* Main Layout */
        #admin-content { display: none; padding: 30px 8%; }

        .header { 
            background: var(--primary); color: white; padding: 30px; border-radius: 15px; 
            text-align: center; margin-bottom: 30px; border-bottom: 5px solid var(--gold);
        }
        .header h1 { font-family: 'Amiri', serif; font-size: 2.5rem; margin-bottom: 10px; }

        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h4 { margin: 0; color: #7f8c8d; font-size: 0.9rem; }
        .stat-card div { font-size: 1.8rem; font-weight: bold; color: var(--gold); }

        /* Form Card */
        .card { background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card h3 { border-right: 4px solid var(--gold); padding-right: 15px; margin-bottom: 20px; }

        input, textarea, select { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #eee; 
            border-radius: 8px; font-family: 'Cairo'; box-sizing: border-box; transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); outline: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { 
            background: var(--primary); color: white; border: none; padding: 12px 25px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; transition: 0.3s; 
        }
        .btn:hover { background: var(--gold); color: var(--primary); }
        .btn-cancel { background: #95a5a6; }

        /* Articles Table */
        .search-box { margin-bottom: 15px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: var(--white); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #7f8c8d; font-weight: 600; }
        
        .actions { display: flex; gap: 8px; }
        .btn-sm { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.85rem; font-family: 'Cairo'; }
        .btn-edit { background: #3498db; color: white; }
        .btn-delete { background: var(--danger); color: white; }

        /* Logout */
        .logout-link { color: #e74c3c; cursor: pointer; text-decoration: underline; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="font-family: 'Amiri'; font-size: 2rem;">مرحباً نهال 👋</h2>
            <p style="color: #666; margin-bottom: 25px;">دخول الأمين الثقافي للدفعة 32</p>
            <input type="password" id="pass-field" placeholder="كلمة المرور الخاصة بكِ">
            <button class="btn" onclick="checkAuth()" style="width: 100%; margin-top: 15px;">دخول للوحة التحكم</button>
        </div>
    </div>

    <div id="admin-content">
        <div class="header">
            <h1>إدارة محتوى Batch 32 🦷</h1>
            <p>أهلاً نهال، الميدان الثقافي بين يديكِ الآن.</p>
            <span class="logout-link" onclick="location.reload()">تسجيل الخروج</span>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <h4>إجمالي المقالات</h4>
                <div id="stat-count">0</div>
            </div>
            <div class="stat-card">
                <h4>إجمالي الإعجابات</h4>
                <div id="stat-likes">0</div>
            </div>
            <div class="stat-card">
                <h4>آخر تحديث</h4>
                <div id="stat-date" style="font-size: 1rem;">--</div>
            </div>
        </div>

        <div class="card">
            <h3 id="form-title">إضافة مقال جديد</h3>
            <input type="hidden" id="edit-id">
            <input type="text" id="title" placeholder="عنوان المقال (مثلاً: أخلاقيات المهنة)">
            <input type="text" id="category" placeholder="التصنيف (طبي، ثقافي، أدبي...)">
            <textarea id="summary" placeholder="نبذة مختصرة تظهر في قائمة المدونة..." rows="2"></textarea>
            <textarea id="content" placeholder="اكتبي المقال الكامل هنا..." rows="8"></textarea>
            
            <div class="btn-group">
                <button class="btn" id="submit-btn" onclick="handlePublish()">نشر المقال الآن 🚀</button>
                <button class="btn btn-cancel" id="cancel-btn" style="display: none;" onclick="resetForm()">إلغاء التعديل</button>
            </div>
        </div>

        <div class="card">
            <h3>المقالات المنشورة</h3>
            <input type="text" id="search" placeholder="بحث عن مقال بالاسم..." onkeyup="filterArticles()">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>العنوان</th>
                            <th>التصنيف</th>
                            <th>الإعجابات</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="articles-list">
                        <tr><td colspan="4" style="text-align: center;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allArticles = [];

        function checkAuth() {
            const pass = document.getElementById('pass-field').value;
            if(pass === "3232") {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadAdminArticles();
            } else { alert("كلمة المرور غير صحيحة يا نهال!"); }
        }

        async function loadAdminArticles() {
            const { data, error } = await _supabase.from('articles').select('*').order('id', { ascending: false });
            if (error) return console.error(error);
            
            allArticles = data;
            renderArticles(data);
            updateStats(data);
        }

        function renderArticles(articles) {
            const list = document.getElementById('articles-list');
            list.innerHTML = articles.map(art => `
                <tr>
                    <td><strong>${art.title}</strong></td>
                    <td><span style="color:var(--gold)">${art.category}</span></td>
                    <td>❤️ ${art.likes || 0}</td>
                    <td class="actions">
                        <button class="btn-sm btn-edit" onclick="editArt(${art.id})">تعديل</button>
                        <button class="btn-sm btn-delete" onclick="deleteArt(${art.id})">حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(data) {
            document.getElementById('stat-count').innerText = data.length;
            const totalLikes = data.reduce((sum, art) => sum + (art.likes || 0), 0);
            document.getElementById('stat-likes').innerText = totalLikes;
            document.getElementById('stat-date').innerText = new Date().toLocaleDateString('ar-EG');
        }

        async function handlePublish() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                summary: document.getElementById('summary').value,
                content: document.getElementById('content').value
            };

            if(!payload.title || !payload.content) return alert("العنوان والمحتوى مطلوبان!");

            if(id) {
                // تحديث
                const { error } = await _supabase.from('articles').update(payload).eq('id', id);
                if(!error) alert("تم تحديث المقال بنجاح!");
            } else {
                // إضافة جديد
                const { error } = await _supabase.from('articles').insert([payload]);
                if(!error) alert("تم نشر المقال الجديد!");
            }

            resetForm();
            loadAdminArticles();
        }

        function editArt(id) {
            const art = allArticles.find(a => a.id === id);
            document.getElementById('edit-id').value = art.id;
            document.getElementById('title').value = art.title;
            document.getElementById('category').value = art.category;
            document.getElementById('summary').value = art.summary;
            document.getElementById('content').value = art.content;
            
            document.getElementById('form-title').innerText = "تعديل المقال الحالي";
            document.getElementById('submit-btn').innerText = "حفظ التعديلات ✅";
            document.getElementById('cancel-btn').style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteArt(id) {
            if(!confirm("هل أنتِ متأكدة من حذف هذا المقال؟ لا يمكن التراجع عن هذه الخطوة.")) return;
            const { error } = await _supabase.from('articles').delete().eq('id', id);
            if(!error) loadAdminArticles();
        }

        function resetForm() {
            document.getElementById('edit-id').value = "";
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
            document.getElementById('form-title').innerText = "إضافة مقال جديد";
            document.getElementById('submit-btn').innerText = "نشر المقال الآن 🚀";
            document.getElementById('cancel-btn').style.display = "none";
        }

        function filterArticles() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = allArticles.filter(a => a.title.toLowerCase().includes(term));
            renderArticles(filtered);
        }
    </script>
</body>
</html>
