<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | Batch 32</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; padding: 20px; }
        .admin-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; display: block; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #d4af37; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>إضافة مقال جديد ✍️</h2>
    <input type="text" id="title" placeholder="عنوان المقال">
    <input type="text" id="category" placeholder="التصنيف (مثلاً: طب، ثقافة)">
    <input type="text" id="image_url" placeholder="رابط الصورة المباشر (مثل: https://site.com/image.jpg)">
    <textarea id="summary" placeholder="نبذة مختصرة للمدونة" rows="3"></textarea>
    <textarea id="content" placeholder="محتوى المقال الكامل" rows="8"></textarea>
    <button onclick="publishArticle()">🚀 نشر المقال الآن</button>
    <div id="status"></div>
</div>

<script>
    const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
    const SUPABASE_KEY = 'YOUR_SUPABASE_KEY_HERE'; // ضع مفتاحك هنا
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function publishArticle() {
        const status = document.getElementById('status');
        const payload = {
            title: document.getElementById('title').value,
            category: document.getElementById('category').value,
            image_url: document.getElementById('image_url').value,
            summary: document.getElementById('summary').value,
            content: document.getElementById('content').value,
            likes: 0
        };

        status.innerHTML = "جاري النشر...";
        
        const { data, error } = await _supabase.from('articles').insert([payload]);

        if (error) {
            status.style.color = "red";
            status.innerHTML = "خطأ: " + error.message;
            console.error(error);
        } else {
            status.style.color = "green";
            status.innerHTML = "✅ تم نشر المقال بنجاح!";
            // مسح الحقول بعد النجاح
            document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        }
    }
</script>
</body>
</html>
