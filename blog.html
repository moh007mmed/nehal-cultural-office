<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات | نهال أحمد حسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --bg: #f9f9f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; padding: 20px 8%; align-items: center; background: var(--primary); color: white; }
        nav ul { display: flex; list-style: none; }
        nav ul li a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; }

        .header-blog { text-align: center; padding: 60px 20px; background: white; border-bottom: 2px solid #eee; }
        .header-blog h1 { font-family: 'Amiri', serif; font-size: 3rem; color: var(--primary); }

        .container { padding: 40px 8%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* Card Style */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-body { padding: 20px; }
        .card-category { color: var(--accent); font-weight: bold; font-size: 0.8rem; }
        .card-title { font-family: 'Amiri', serif; font-size: 1.5rem; margin: 10px 0; color: var(--primary); }
        .card-text { color: #666; font-size: 0.9rem; line-height: 1.6; }
        .card-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        
        .btn-read { cursor: pointer; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo" style="font-family: 'Amiri', serif; font-size: 1.5rem;">Batch 32</div>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="blog.html" style="color: var(--accent)">المقالات</a></li>
        </ul>
    </nav>

    <div class="header-blog">
        <h1>المقالات الطبية والثقافية</h1>
        <p>مساحة للفكر والمعرفة بقلم نهال أحمد حسين</p>
    </div>

    <div class="container" id="blog-grid">
        </div>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'YOUR_SUPABASE_KEY_HERE'; // ضع مفتاحك هنا
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadArticles() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            const grid = document.getElementById('blog-grid');
            grid.innerHTML = articles.map(art => `
                <div class="card">
                    <img src="${art.image_url || 'https://via.placeholder.com/400x200?text=No+Image'}" alt="${art.title}">
                    <div class="card-body">
                        <span class="card-category">${art.category}</span>
                        <h3 class="card-title">${art.title}</h3>
                        <p class="card-text">${art.summary}</p>
                    </div>
                    <div class="card-footer">
                        <span class="btn-read" onclick="alert('سيتم عرض المقال الكامل قريباً')">اقرأ المزيد ←</span>
                        <span>❤️ ${art.likes || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadArticles;
    </script>
</body>
</html>
