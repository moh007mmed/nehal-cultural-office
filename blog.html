<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الطبية | Batch 32</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --gold: #d4af37; --bg: #f9f9f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; }
        
        /* Navigation */
        nav { display: flex; justify-content: space-between; padding: 15px 8%; background: var(--primary); color: white; align-items: center; }
        nav ul { display: flex; list-style: none; gap: 20px; }
        nav a { color: white; text-decoration: none; font-weight: 600; }

        /* Grid */
        .container { padding: 40px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border-bottom: 4px solid var(--gold); display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
        .card-body { padding: 20px; flex-grow: 1; }
        .card-body h3 { font-family: 'Amiri', serif; font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
        
        /* Like Button Logic */
        .actions { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .like-btn { cursor: pointer; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; background: white; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .like-btn.active { background: #ffebeb; border-color: #e74c3c; color: #e74c3c; }
        .read-more { color: var(--primary); font-weight: bold; cursor: pointer; }

        /* Modal (نافذة عرض المقال) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow-y: auto; padding: 20px; }
        .modal-content { background: white; max-width: 800px; margin: 40px auto; border-radius: 15px; padding: 40px; position: relative; line-height: 1.8; }
        .modal-content img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .modal-content h2 { font-family: 'Amiri', serif; font-size: 2.5rem; color: var(--primary); margin-bottom: 20px; }
        .close-modal { position: absolute; left: 20px; top: 20px; font-size: 30px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

    <nav>
        <div style="font-family: 'Amiri'; font-size: 1.5rem;">Batch 32</div>
        <ul>
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="blog.html">المقالات</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 style="text-align: center; font-family: 'Amiri'; font-size: 3rem; margin-bottom: 40px;">المقالات الطبية والثقافية</h1>
        <div id="blog-grid" class="grid"></div>
    </div>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadBlog() {
            const { data: articles } = await _supabase.from('articles').select('*').order('id', { ascending: false });
            const grid = document.getElementById('blog-grid');
            const likedList = JSON.parse(localStorage.getItem('liked_arts') || '[]');

            grid.innerHTML = articles.map(art => {
                const isLiked = likedList.includes(art.id);
                return `
                <div class="card">
                    ${art.image_url ? `<img src="${art.image_url}" class="card-img">` : ''}
                    <div class="card-body">
                        <span style="color:var(--gold); font-size:0.8rem; font-weight:bold;">#${art.category}</span>
                        <h3>${art.title}</h3>
                        <p>${art.summary}</p>
                    </div>
                    <div class="actions">
                        <button id="btn-${art.id}" class="like-btn ${isLiked ? 'active' : ''}" onclick="toggleLike(${art.id}, ${art.likes || 0})">
                            ❤️ <span id="count-${art.id}">${art.likes || 0}</span>
                        </button>
                        <span class="read-more" onclick="openModal(${JSON.stringify(art).replace(/"/g, '&quot;')})">اقرأ المقال ←</span>
                    </div>
                </div>
            `}).join('');
        }

        async function toggleLike(id, currentLikes) {
            let likedList = JSON.parse(localStorage.getItem('liked_arts') || '[]');
            const btn = document.getElementById(`btn-${id}`);
            const countSpan = document.getElementById(`count-${id}`);
            let newLikes = currentLikes;

            if (likedList.includes(id)) {
                // إلغاء اللايك
                newLikes = currentLikes - 1;
                likedList = likedList.filter(item => item !== id);
                btn.classList.remove('active');
            } else {
                // إضافة لايك
                newLikes = currentLikes + 1;
                likedList.push(id);
                btn.classList.add('active');
            }

            localStorage.setItem('liked_arts', JSON.stringify(likedList));
            countSpan.innerText = newLikes;
            await _supabase.from('articles').update({ likes: newLikes }).eq('id', id);
        }

        function openModal(art) {
            const modal = document.getElementById('articleModal');
            const body = document.getElementById('modal-body');
            body.innerHTML = `
                ${art.image_url ? `<img src="${art.image_url}">` : ''}
                <h2>${art.title}</h2>
                <div style="white-space: pre-wrap; font-size: 1.2rem; color: #444;">${art.content}</div>
            `;
            modal.style.display = "block";
            document.body.style.overflow = "hidden"; // منع التمرير في الخلفية
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('articleModal')) closeModal();
        }

        window.onload = loadBlog;
    </script>
</body>
</html>
