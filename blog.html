<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الطبية | نهال حسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --bg: #fdfdfd; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; }
        
        nav { display: flex; justify-content: space-between; padding: 20px 8%; align-items: center; background: var(--primary); color: white; position: sticky; top: 0; z-index: 1000; }
        nav ul { display: flex; list-style: none; margin: 0; }
        nav ul li a { color: white; text-decoration: none; margin-right: 20px; font-weight: bold; transition: 0.3s; }
        nav ul li a:hover { color: var(--accent); }

        .blog-header { text-align: center; padding: 80px 20px; background: white; border-bottom: 1px solid #eee; }
        .blog-header h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--primary); margin: 0; }
        .divider { width: 60px; height: 4px; background: var(--accent); margin: 20px auto; }

        .articles-grid { padding: 50px 8%; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        
        .article-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; }
        .article-card:hover { transform: translateY(-10px); }
        .article-card img { width: 100%; height: 220px; object-fit: cover; background: #f0f0f0; }
        
        .card-content { padding: 25px; flex-grow: 1; }
        .category { color: var(--accent); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        .card-content h3 { font-family: 'Amiri', serif; font-size: 1.7rem; margin: 10px 0; color: var(--primary); }
        .card-content p { color: #777; line-height: 1.6; font-size: 0.95rem; }
        
        .card-footer { padding: 20px 25px; border-top: 1px solid #f9f9f9; display: flex; justify-content: space-between; align-items: center; }
        .read-more { font-weight: bold; color: var(--primary); cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>

<nav>
    <div class="logo" style="font-family: 'Amiri', serif; font-size: 1.6rem;">Batch 32</div>
    <ul>
        <li><a href="index.html">عن نهال</a></li>
        <li><a href="blog.html" style="color: var(--accent);">المقالات</a></li>
    </ul>
</nav>

<div class="blog-header">
    <h1>المقالات الثقافية والطبية</h1>
    <div class="divider"></div>
    <p>بإشراف الأمين الثقافي لدفعة 32</p>
</div>

<div class="articles-grid" id="grid">
    <p style="text-align: center; grid-column: 1/-1;">جاري تحميل المحتوى الثقافي...</p>
</div>

<script>
    const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadBlog() {
        const { data: articles, error } = await _supabase
            .from('articles')
            .select('*')
            .order('id', { ascending: false });

        if (error) {
            document.getElementById('grid').innerHTML = "فشل تحميل المقالات. تأكد من إعدادات قاعدة البيانات.";
            return;
        }

        const grid = document.getElementById('grid');
        grid.innerHTML = articles.map(art => `
            <div class="article-card">
                <img src="${art.image_url || 'https://via.placeholder.com/400x220?text=Batch+32'}" alt="${art.title}">
                <div class="card-content">
                    <span class="category">${art.category}</span>
                    <h3>${art.title}</h3>
                    <p>${art.summary}</p>
                </div>
                <div class="card-footer">
                    <span class="read-more" onclick="alert('سيتم فتح المحتوى الكامل قريباً')">اقرأ المقال ←</span>
                    <span style="color: #ff4757;">❤️ ${art.likes || 0}</span>
                </div>
            </div>
        `).join('');
    }

    window.onload = loadBlog;
</script>
</body>
</html>
