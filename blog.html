<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الطبية | نهال أحمد حسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37; /* ذهبي ثقافي */
            --text-light: #ecf0f1;
            --bg-light: #f9f9f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: var(--bg-light);
        }

        /* Header & Hero */
        header {
            height: 60vh; /* تم تقليل الارتفاع لتناسب صفحة المقالات */
            background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80') no-repeat center center/cover;
            position: relative;
            color: white;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 8%;
            align-items: center;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        nav ul li a:hover, nav ul li a.active {
            color: var(--accent-color);
        }

        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            font-family: 'Amiri', serif;
            margin-bottom: 10px;
        }

        .divider {
            width: 100px;
            height: 4px;
            background: var(--accent-color);
            margin: 20px 0;
        }

        /* Blog Section */
        .container {
            padding: 80px 10%;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-family: 'Amiri', serif;
            color: var(--primary-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .article-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-bottom: 4px solid var(--accent-color);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .article-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .article-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #eee;
        }

        .article-content {
            padding: 25px;
            flex-grow: 1;
        }

        .article-category {
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
        }

        .article-card h3 {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .article-card p {
            color: #666;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .read-more {
            color: var(--primary-color);
            font-weight: bold;
            display: inline-block;
            margin-top: auto;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: #fff;
            margin: 50px auto;
            border-radius: 15px;
            width: 90%;
            max-width: 850px;
            position: relative;
            animation: slideIn 0.4s ease-out;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 30px;
            color: white;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: var(--accent-color);
        }

        .modal-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
        }

        .modal-body {
            padding: 50px;
        }

        .modal-title {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 1.15rem;
            line-height: 2;
            color: #444;
            white-space: pre-wrap;
        }

        /* Footer */
        footer {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 40px 0;
            margin-top: 50px;
        }

        footer p {
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        /* Responsiveness */
        @media (max-width: 768px) {
            .hero-text h1 { font-size: 2.5rem; }
            nav { flex-direction: column; padding: 15px; }
            nav ul { margin-top: 20px; }
            .modal-content { margin: 20px auto; width: 95%; }
            .modal-body { padding: 30px 20px; }
            .modal-img { height: 250px; }
            .modal-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="overlay">
            <nav>
                <div class="logo" style="font-size: 1.5rem; font-weight: bold; font-family: 'Amiri', serif;">Batch 32</div>
                <ul>
                    <li><a href="index.html">عن نهال</a></li>
                    <li><a href="blog.html" class="active">المقالات الطبية</a></li>
                    <li><a href="batch32.html">Batch 32</a></li>
                </ul>
            </nav>
            <div class="hero-text">
                <h1>المقالات الثقافية والطبية</h1>
                <div class="divider"></div>
                <q>مساحة للفكر والمعرفة بقلم نهال أحمد حسين</q>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">أحدث المقالات</h2>
        <div id="blog-grid" class="grid">
            <p style="text-align: center; grid-column: 1/-1; font-weight: bold;">جاري تحميل المقالات من قاعدة البيانات...</p>
        </div>
    </main>

    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" class="modal-img" alt="صورة المقال">
            <div class="modal-body">
                <span id="modal-category" class="article-category"></span>
                <h2 id="modal-title" class="modal-title"></h2>
                <div id="modal-text" class="modal-text"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>يمتلك حقوق هذا الموقع نهال أحمد حسين</p>
        <p>&copy; 2026 جميع الحقوق محفوظة - Batch 32 Cultural Office</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadBlog() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('*')
                .order('id', { ascending: false });

            const grid = document.getElementById('blog-grid');

            if (error) {
                grid.innerHTML = `<p style="text-align: center; grid-column: 1/-1; color: red;">فشل تحميل المقالات. يرجى التحقق من إعدادات قاعدة البيانات.</p>`;
                console.error(error);
                return;
            }

            if (!articles || articles.length === 0) {
                grid.innerHTML = `<p style="text-align: center; grid-column: 1/-1;">لا توجد مقالات منشورة حتى الآن.</p>`;
                return;
            }

            grid.innerHTML = articles.map(art => {
                const imgSrc = art.image_url || 'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80';
                const encodedArt = encodeURIComponent(JSON.stringify(art));
                
                return `
                <div class="article-card" onclick="openModal('${encodedArt}')">
                    <img src="${imgSrc}" alt="${art.title}">
                    <div class="article-content">
                        <span class="article-category">${art.category || 'عام'}</span>
                        <h3>${art.title}</h3>
                        <p>${art.summary || ''}</p>
                        <span class="read-more">قراءة المقال ←</span>
                    </div>
                </div>
            `}).join('');
        }

        function openModal(encodedArt) {
            const art = JSON.parse(decodeURIComponent(encodedArt));
            const defaultImg = 'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80';
            
            document.getElementById('modal-img').src = art.image_url || defaultImg;
            document.getElementById('modal-category').innerText = art.category || 'عام';
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-text').innerText = art.content;
            
            document.getElementById('articleModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = "none";
            document.body.style.overflow = "auto";
        }

        window.onclick = function(event) {
            const modal = document.getElementById('articleModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        window.onload = loadBlog;
    </script>
</body>
</html>
