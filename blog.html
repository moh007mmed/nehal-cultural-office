<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المقالات الطبية | Batch 32</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #d4af37; /* الذهبي الثقافي */
            --bg-light: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff;
            color: #333;
        }

        /* Nav من الهوية الرئيسية */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 8%;
            align-items: center;
            background: var(--primary-color);
            color: white;
        }

        nav ul { display: flex; list-style: none; }
        nav ul li a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 600;
            transition: 0.3s;
        }
        nav ul li a:hover { color: var(--accent-color); }

        /* ترويسة الصفحة */
        .page-header {
            text-align: center;
            padding: 60px 10%;
            background: var(--bg-light);
            border-bottom: 1px solid #eee;
        }

        .page-header h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: var(--accent-color);
            margin: 15px auto;
        }

        /* شبكة المقالات */
        .container { padding: 60px 10%; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-bottom: 4px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            transition: 0.3s ease;
        }

        .card:hover { transform: translateY(-10px); }

        .tag {
            display: inline-block;
            background: var(--accent-color);
            color: var(--primary-color);
            padding: 3px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            align-self: flex-start;
        }

        .card h3 {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .card p {
            font-size: 1rem;
            color: #666;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        /* أزرار التفاعل */
        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .like-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Cairo';
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .like-btn:hover { background: #fdfaf0; border-color: var(--accent-color); }

        .read-more {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .read-more:hover { color: var(--accent-color); }

        /* Footer */
        footer {
            background: var(--primary-color);
            color: white;
            text-align: center;
            padding: 40px 0;
            margin-top: 60px;
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 2rem; }
            nav { flex-direction: column; }
            nav ul { margin-top: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" style="font-size: 1.5rem; font-weight: bold; font-family: 'Amiri', serif;">Batch 32</div>
        <ul>
            <li><a href="index.html">عن نهال</a></li>
            <li><a href="blog.html">المقالات الطبية</a></li>
            <li><a href="batch32.html">Batch 32</a></li>
        </ul>
    </nav>

    <header class="page-header">
        <h1>المقالات الطبية والثقافية</h1>
        <div class="divider"></div>
        <p>نافذة Batch 32 نحو المعرفة والإبداع</p>
    </header>

    <div class="container">
        <div id="blog-grid" class="grid">
            </div>
    </div>

    <footer>
        <p>يمتلك حقوق هذا الموقع نهال أحمد حسين</p>
        <p>&copy; 2026 جميع الحقوق محفوظة - Batch 32 Cultural Office</p>
    </footer>

    <script>
        const SUPABASE_URL = 'https://mjyzihykduodmbicgsgg.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Ob-thmUfjYq8gs0ZwNT52A_JNUZMVEb';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchArticles() {
            const { data: articles, error } = await _supabase
                .from('articles')
                .select('*')
                .order('id', { ascending: false });

            if (error) return console.log('Error:', error);

            const grid = document.getElementById('blog-grid');
            grid.innerHTML = articles.map(art => `
                <div class="card">
                    <span class="tag">${art.category}</span>
                    <h3>${art.title}</h3>
                    <p>${art.summary}</p>
                    <div class="card-actions">
                        <button class="like-btn" onclick="addLike(${art.id}, ${art.likes || 0})">
                            ❤️ <span id="like-count-${art.id}">${art.likes || 0}</span>
                        </button>
                        <span class="read-more" onclick="alert('محتوى المقال:\\n\\n' + '${art.content.replace(/\n/g, '\\n')}')">اقرأ المزيد ←</span>
                    </div>
                </div>
            `).join('');
        }

        async function addLike(id, currentLikes) {
            const countSpan = document.getElementById(`like-count-${id}`);
            countSpan.innerText = parseInt(countSpan.innerText) + 1;

            const { error } = await _supabase
                .from('articles')
                .update({ likes: currentLikes + 1 })
                .eq('id', id);
        }

        window.onload = fetchArticles;
    </script>
</body>
</html>
